# Address Validation Pipeline Configuration

# API Configuration
api:
  provider: "smartystreets"
  batch_size: 100  # Max addresses per API call
  max_retries: 3
  retry_delay_seconds: 2
  timeout_seconds: 30
  rate_limit:
    requests_per_second: 10
    burst_capacity: 50

# Caching Configuration
cache:
  enabled: true
  provider: "dynamodb"
  table_name: "address_validation_cache"
  ttl_days: 90
  hash_algorithm: "sha256"
  # Cache addresses if previously validated within TTL

# Deduplication Configuration
deduplication:
  enabled: true
  strategy: "hash_based"
  # Dedupe before API calls to reduce costs

# Input Configuration
input:
  format: "parquet"
  required_fields:
    - "address_line1"
    - "city"
    - "state"
    - "zip_code"
  optional_fields:
    - "address_line2"
    - "address_line3"

# Output Configuration
output:
  format: "iceberg"
  partition_by:
    - "validation_date"
    - "state"
  enrichment_fields:
    - "dpv_match_code"  # Delivery Point Validation
    - "dpv_footnotes"
    - "zip_plus4"
    - "county_fips"
    - "county_name"
    - "latitude"
    - "longitude"
    - "precision"
    - "time_zone"
  validation_metadata:
    - "validation_status"  # valid, invalid, corrected, partial
    - "validation_timestamp"
    - "api_response_code"
    - "confidence_score"

# Address Standardization Rules
standardization:
  trim_whitespace: true
  uppercase: true
  abbreviations:
    enabled: true
    # Street types: Street → ST, Avenue → AVE
    # Directionals: North → N, South → S
    # Unit designators: Apartment → APT, Suite → STE

# Data Quality Thresholds
quality:
  min_valid_rate: 0.80  # 80% of addresses should validate
  max_invalid_rate: 0.20
  alert_on_quality_drop: true

# Cost Optimization
cost_optimization:
  skip_if_cached: true
  skip_if_validated_recently: true
  dedupe_before_validation: true
  batch_api_calls: true

# Logging Configuration
logging:
  level: "INFO"
  log_api_calls: true
  log_cache_hits: true
  log_validation_failures: true
